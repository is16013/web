<html>
  <head>
    <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-box position="-1 0.5 -3" rotation="30 45 0" color="#00A600"></a-box>
      <a-box position="2 3 -3" rotation="30 45 40" color="#C900DC"></a-box>
      <a-sphere position="0 3 -2" radius="1" color="#0057FF"></a-sphere>
      <a-cylinder position="1 0.75 -3" rotation="0 0 60" radius="0.3" height="5" color="#FF0000"></a-cylinder>
      <a-cylinder position="2 0.75 -2" rotation="0 0 60" radius="0.3" height="5" color="#FF0000"></a-cylinder>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="5" height="4" color="#FFFF00"></a-plane>
      <a-sky color="#000000"></a-sky>
    </a-scene>
  </body>
</html>
